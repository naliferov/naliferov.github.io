      let str = ''
      let len = '20'

      while (str.length < len) {
        const arr = new Uint8Array(100)
        crypto.getRandomValues(arr)
        for (let i = 0; i < arr.length; i++) {
          const v = arr[i]
          if (v >= 33 && v < 127) str += String.fromCharCode(v)

        }
